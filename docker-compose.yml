version: '3.9'

services:

  mongo:
    image: mongo:7
    container_name: himalayan_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: himalayan_backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      MONGO_URI: mongodb://mongo:27017/himalayan-cruiser
      JWT_SECRET: ${JWT_SECRET:-himalayan_secret_change_in_prod}
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: himalayan_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
